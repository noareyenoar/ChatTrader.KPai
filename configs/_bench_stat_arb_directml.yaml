data:
  dataset_dir: Dataset/binance_historical
  manifest_path: Dataset/binance_historical/manifest.json
  min_history_bars: 50000
  purge_gap_bars: 20
  seq_len: 32
  horizon: 10
  max_assets: 2
  max_rows_per_symbol: 6000

training:
  seed: 42
  preferred_backend: directml
  batch_size: 128
  max_epochs: 1
  patience: 10
  lr: 0.001
  weight_decay: 0.0001
  recon_weight: 0.5
  num_workers: 4
  num_workers_non_cuda: 0
  checkpoint_root: models/checkpoints/stat_arb
  tensorboard_root: models/tensorboard/stat_arb

models:
  autoencoder:
    latent_dim: 32
    dropout: 0.1
  gat:
    d_model: 32
    num_layers: 2
    dropout: 0.1
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.1

registry_path: model_registry.json

