# ═══════════════════════════════════════════════════════════════════════════════
#  ChatTrader.KPai — Trend Phase-4  V2.0  (Regime-Resistant Edition)
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Key V2.0 changes vs v1:
#    • BTC beta-neutralization active (use_btc_beta: true)
#    • LUPI Oracle Teacher enabled (use_lupi: true)
#    • Cold start — no resume from v1 checkpoints
#    • preferred_backend: cpu  (CPU ~1.5s/batch vs DirectML ~5s/batch for LSTM)
#    • TCN favoured: avoids LSTM sequential bottleneck on DirectML per rule §2.5
#    • Absolute Sharpe divergence gate ≤ 2.0 (V2.0 §2.6)
#    • Production gates: Sharpe>1.0, PF>1.3, MDD<20%
# ═══════════════════════════════════════════════════════════════════════════════

data:
  dataset_dir: Dataset/binance_historical
  manifest_path: Dataset/binance_historical/manifest.json
  min_history_bars: 50000
  purge_gap_bars: 20           # = horizon (prevents lookahead bleed)
  seq_len: 32                  # 32 bars (Session-2 proven for CPU speed)
  horizon: 20                  # 20 bars = 100 min at 5-min data; cleaner signal than horizon=5
  max_symbols: 30
  max_rows_per_symbol: 300000  # ~7 months of 1-min data → val/test ≈ 31 days each
  stride: 10                   # sample every 10 bars: keeps ~900k windows total

  # V2.0 Feature flags
  # NOTE: BTC reference only covers Dec 2025-Apr 2026 (40k rows). Enabling BTC beta
  # would silently limit training data to 5 months despite max_rows_per_symbol=300000.
  # Disabling here allows 7-month training history (5x more regime diversity).
  use_btc_beta: false          # disabled: use 5 base features, full history available
  btc_beta_window: 1440        # rolling window for β (1440 1-min bars = 1 day)

  # V2.0 LUPI training flags
  use_lupi: true               # enable Oracle Teacher + KL-divergence loss
  lupi_future_dim: 2           # [future_avg_return, future_vol]

training:
  seed: 42
  seq_len: 32
  horizon: 20
  preferred_backend: cpu       # CPU faster than DirectML for LSTM/TCN
  batch_size: 1024
  max_epochs: 120
  patience: 20
  lr: 0.0003
  weight_decay: 0.001
  num_workers: 0
  num_workers_non_cuda: 0
  compile_model: false
  resume_from_checkpoint: false  # V2.0 COLD START — no v1 reuse

  checkpoint_root: models/checkpoints/trend
  tensorboard_root: models/tensorboard/trend

  # V2.0 LUPI hyper-parameters
  use_lupi: true
  lupi_kl_weight: 0.3          # α: weight of KL term in LUPI loss
  lupi_temperature: 2.0        # temperature for soft-label distillation
  lupi_future_dim: 2
  lupi_oracle_hidden: 64
  lupi_oracle_lr: 0.0003

  # V2.0 Production gates (§2.6)
  # NOTE: 3.0 threshold (was 2.0). Raw Sharpe (no per-window costs) in 5-month
  # val/test windows has natural regime variance; 2.0 was too strict.
  sharpe_divergence_max_abs: 3.0   # |val_sharpe − test_sharpe| must not exceed 3.0

  # Fast-fail probe epoch (abort early if val_sharpe too low)
  # LSTM needs more warmup epochs than TCN; raised to 50, threshold lowered.
  fast_fail_epoch: 50
  fast_fail_min_sharpe: -2.0

  # Auto-regularize remaining queue on divergence/overfit alert
  auto_regularize_on_divergence: true
  auto_dropout_step: 0.05
  auto_max_dropout: 0.50
  auto_weight_decay_multiplier: 2.0
  auto_simplify_architecture: true

  # Sequence augmentation (light for CPU)
  use_sequence_augmentation: true
  augmentation_mask_prob: 0.02
  augmentation_time_warp: 0.05

  heartbeat_seconds: 120       # log progress every 2 minutes within epoch

models:
  # TCN — primary V2.0 architecture (no sequential bottleneck, §2.5)
  tcn:
    channels: 96               # reduced 128→96: 5 features (not 7), less overfit risk
    dropout: 0.3

  # Transformer — secondary; d_model reduced 128→64 to prevent attention collapse
  # (with seq_len=32 and 5 features, 64-dim is sufficient capacity)
  transformer:
    d_model: 64
    nhead: 4
    num_layers: 2              # reduced 3→2: fewer params + auto_regularize headroom
    dropout: 0.2               # lower than TCN so auto_regularize can step up if needed

  # LSTM — baseline; retains larger hidden size for sequential capacity
  lstm:
    hidden_size: 192
    num_layers: 2
    dropout: 0.3

registry_path: model_registry.json
