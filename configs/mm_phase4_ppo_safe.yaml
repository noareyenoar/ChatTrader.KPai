# PPO only — safe resource budget (10% capacity)
# batch_size 512→64 (12.5%), rollout_len 1024→256, max_episodes 8000→4000
# CPU backend to avoid DirectML memory pressure alongside other jobs
data:
  dataset_dir: Dataset/binance_historical
  manifest_path: Dataset/binance_historical/manifest.json
  min_history_bars: 50000
  purge_gap_bars: 20
  max_symbols: 34
  max_rows: 50000

training:
  seed: 42
  preferred_backend: cpu
  hidden: 256
  lr: 0.0003
  weight_decay: 0.0001
  episode_length: 400
  inventory_lambda: 0.05
  warmup_steps: 20
  reward_alpha_pos: 0.75
  reward_alpha_neg: 1.5
  reward_scale: 1.0
  survival_bonus: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  rollout_len: 256
  max_episodes: 4000
  max_steps: 1000000
  replay_buffer_size: 50000
  batch_size: 64
  tau: 0.005
  target_update_freq: 500
  eps_start: 1.0
  eps_end: 0.05
  eps_decay: 0.9998
  checkpoint_root: models/checkpoints/market_maker
  tensorboard_root: models/tensorboard/market_maker

models:
  ppo: {}

registry_path: model_registry.json
