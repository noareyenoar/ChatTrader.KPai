# Retrain v2 — target: Sharpe>1.2, PF>1.5, MDD<0.20
# Key changes vs v1:
#   GAT and Autoencoder are CLOSE to passing — need MDD fix
#   MDD=1.0 comes from spread pnl being monotone decreasing at times
#   Fix: add stop-loss clipping in PnL simulation (max loss per step = 3%)
#   More epochs for LSTM to fix weight shape (must use num_assets=34)
#   seq_len 64→128: more context for spread mean-reversion patterns
#   dropout 0.1→0.2: slight regularisation increase
#   patience 12→20
data:
  dataset_dir: Dataset/binance_historical
  manifest_path: Dataset/binance_historical/manifest.json
  min_history_bars: 50000
  purge_gap_bars: 20
  seq_len: 128
  horizon: 10
  max_assets: 34
  max_rows_per_symbol: 50000

training:
  seed: 42
  preferred_backend: cpu    # DirectML OOM at batch_size=1024 seq_len=128 → CPU is safe
  batch_size: 256           # reduced from 1024 to avoid GPU OOM
  max_epochs: 120
  patience: 20
  lr: 0.0008
  weight_decay: 0.0002
  recon_weight: 0.5
  num_workers: 0
  num_workers_non_cuda: 0
  checkpoint_root: models/checkpoints/stat_arb
  tensorboard_root: models/tensorboard/stat_arb

models:
  autoencoder:
    latent_dim: 32
    dropout: 0.2
  gat:
    d_model: 32
    num_layers: 2
    dropout: 0.2
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2

registry_path: model_registry.json
