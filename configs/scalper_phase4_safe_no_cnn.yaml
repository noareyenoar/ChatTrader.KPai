# Safe retrain: LinearAttn + GRU only (CNN already done at 8:32 PM)
# batch_size reduced from 4096 → 512 (12.5%) to prevent OOM/thermal crash
# directml_max_batch_size added cap
data:
  dataset_dir: Dataset/binance_historical
  manifest_path: Dataset/binance_historical/manifest.json
  min_history_bars: 50000
  purge_gap_bars: 20
  seq_len: 16
  horizon: 2
  flat_threshold: 0.0010
  max_symbols: 34
  max_rows_per_symbol: 50000

training:
  seed: 42
  preferred_backend: directml
  batch_size: 512
  directml_max_batch_size: 256
  max_epochs: 120
  patience: 15
  lr: 0.0005
  use_cyclic_lr: false
  weight_decay: 0.001
  num_workers: 0
  num_workers_non_cuda: 0
  checkpoint_root: models/checkpoints/scalper
  tensorboard_root: models/tensorboard/scalper

models:
  linear_attn:
    d_model: 64
    nhead: 4
    num_layers: 2
    dropout: 0.3
  gru:
    hidden_size: 64
    num_layers: 2
    dropout: 0.3

registry_path: model_registry.json
