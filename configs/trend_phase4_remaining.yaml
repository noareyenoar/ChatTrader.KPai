# Trend Phase 4 — Remaining models only (Transformer + TCN)
# Auto-regularization applied after LSTM divergence alert:
#   dropout: 0.3 + 0.10 = 0.40
#   weight_decay: 0.001 * 2.0 = 0.002
#   transformer num_layers: 4 - 1 = 3
#   tcn channels: 128 * 0.75 = 96 (rounded to 96)
data:
  dataset_dir: Dataset/binance_historical
  manifest_path: Dataset/binance_historical/manifest.json
  min_history_bars: 50000
  purge_gap_bars: 20
  seq_len: 96
  horizon: 5
  max_symbols: 34
  max_rows_per_symbol: 50000

training:
  seed: 42
  seq_len: 96
  preferred_backend: directml
  batch_size: 2048
  directml_max_batch_size: 256
  max_epochs: 150
  patience: 20
  lr: 0.0003
  weight_decay: 0.002
  num_workers: 0
  num_workers_non_cuda: 0
  compile_model: false
  resume_from_checkpoint: false
  checkpoint_root: models/checkpoints/trend
  tensorboard_root: models/tensorboard/trend
  auto_regularize_on_divergence: false

models:
  transformer:
    d_model: 128
    nhead: 4
    num_layers: 3
    dropout: 0.40
  tcn:
    channels: 96
    dropout: 0.40

registry_path: model_registry.json
