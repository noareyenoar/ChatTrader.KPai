data:
  dataset_dir: Dataset/binance_historical
  manifest_path: Dataset/binance_historical/manifest.json
  min_history_bars: 50000
  purge_gap_bars: 20
  horizon: 20
  max_symbols: 34
training:
  seed: 42
  preferred_backend: directml
  batch_size: 2048
  max_epochs: 30
  patience: 15
  lr: 0.0005
  weight_decay: 0.0001
  num_workers: 4
  num_workers_non_cuda: 0
  checkpoint_root: models/checkpoints/mean_reversion
  tensorboard_root: models/tensorboard/mean_reversion
models:
  mlp:
    hidden_size: 256
    num_layers: 4
    dropout: 0.1
  resnet:
    hidden_size: 256
    depth: 6
    dropout: 0.1
  grn:
    hidden_size: 128
    depth: 4
    dropout: 0.1
registry_path: model_registry.json
